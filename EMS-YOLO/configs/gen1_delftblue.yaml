# DelftBlue config for Table 2 (EMS-ResNet10, T=5)
# For Table 3 change backbone to ems_resnet18 and update wandb.name

model:
  backbone: ems_resnet10
  T: 5
  decay: 0.25
  num_classes: 2
  num_anchors: 3
  anchors:
    - [[10, 14], [23, 27], [37, 58]]     # P4/16
    - [[81, 82], [135, 169], [216, 269]] # P5/32
  strides: [16, 32]

data:
  img_size: 320
  num_workers: 8     # one per CPU core requested in SLURM --cpus-per-task
  pin_memory: true   # fast NVMe /scratch on Linux — beneficial

train:
  epochs: 250
  batch_size: 16
  lr0: 1.0e-2
  momentum: 0.937
  weight_decay: 5.0e-4
  warmup_epochs: 3
  accum_steps: 1     # no accumulation needed at batch_size=16
  amp: true
  eval_every: 5
  save_every: 10

wandb:
  entity: adela-greganova-tu-delft
  project: Gen1-runs
  name: gen1-resnet10-t5
