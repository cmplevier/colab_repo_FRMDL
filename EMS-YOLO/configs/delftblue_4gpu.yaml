model:
  T: 5
  decay: 0.25
  num_classes: 80
  num_anchors: 3
  anchors:
    - [[10, 13], [16, 30], [33, 23]]
    - [[30, 61], [62, 45], [59, 119]]
  strides: [16, 32]

data:
  img_size: 640
  num_workers: 8      # per process; with 4 GPUs (DDP) this is 8 workers per rank
  pin_memory: true    # Linux HPC: no Blackwell allocator issue, pin_memory is beneficial

train:
  epochs: 300
  batch_size: 16      # per GPU; effective batch = 64 across 4 GPUs via DDP
  lr0: 1.0e-2         # scale with effective batch if you change batch_size (linear scaling rule)
  momentum: 0.937
  weight_decay: 5.0e-4
  warmup_epochs: 3
  accum_steps: 1      # no accumulation needed with 4 GPUs
  amp: true
  eval_every: 5
  save_every: 5
