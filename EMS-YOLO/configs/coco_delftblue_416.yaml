model:
  backbone: ems_resnet34
  T: 4
  decay: 0.25
  num_classes: 80
  num_anchors: 3
  anchors:
    - [[10, 14], [23, 27], [37, 58]]
    - [[81, 82], [135, 169], [344, 319]]
  strides: [16, 32]

data:
  img_size: 416
  num_workers: 8
  pin_memory: true

train:
  epochs: 300
  batch_size: 16       # L40S; 4 GPUs × 16 × accum_steps=2 → effective batch=128
  lr0: 2.0e-2          # sqrt-scaled from paper's lr=1e-2 @ batch=32 → ×√4 for batch=128
  momentum: 0.937
  weight_decay: 5.0e-4
  warmup_epochs: 3
  accum_steps: 2
  amp: true
  compile: true
  eval_every: 5
  save_every: 10

wandb:
  entity: adela-greganova-tu-delft
  project: COCO-runs
  name: coco-resnet34-t4-416
