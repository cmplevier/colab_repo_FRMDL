model:
  backbone: ems_resnet34
  T: 4
  decay: 0.25
  num_classes: 80
  num_anchors: 3
  anchors:
    - [[10, 13], [16, 30], [33, 23]]
    - [[30, 61], [62, 45], [59, 119]]
  strides: [16, 32]

data:
  img_size: 640
  num_workers: 8
  pin_memory: true

train:
  epochs: 300
  batch_size: 16
  lr0: 1.0e-2
  momentum: 0.937
  weight_decay: 5.0e-4
  warmup_epochs: 3
  accum_steps: 1      # no accumulation needed when using 4 GPUs via DDP
  amp: true
  eval_every: 5
  save_every: 10

wandb:
  entity: adela-greganova-tu-delft
  project: COCO-runs
  name: coco-resnet34-t4
