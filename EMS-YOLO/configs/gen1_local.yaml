model:
  backbone: ems_resnet10
  T: 5
  decay: 0.25
  num_classes: 2
  num_anchors: 3
  anchors:
    - [[10, 14], [23, 27], [37, 58]]     # P4/16
    - [[81, 82], [135, 169], [216, 269]] # P5/32
  strides: [16, 32]

data:
  img_size: 320
  num_workers: 2
  pin_memory: false

train:
  epochs: 5
  batch_size: 2
  lr0: 1.0e-2
  momentum: 0.937
  weight_decay: 5.0e-4
  warmup_epochs: 1
  accum_steps: 4     # effective batch = 8; keeps training stable on small GPU
  amp: true
  eval_every: 1
  save_every: 5
  max_steps: 20      # cap steps per epoch so a local run finishes in minutes

wandb:
  entity: adela-greganova-tu-delft
  project: Gen1-runs
  name: gen1-local-smoke
